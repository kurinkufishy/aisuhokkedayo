<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NEON HOCKEY 対戦</title>
<style>
  :root{
    --bg:#0a0e1a;
    --court:#101830;
    --line:#1d2b52;
    --p1:#00e5ff;
    --p2:#ff2e88;
    --puck:#f8f32b;
    --text:#e8ecff;
  }
  *{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-user-select:none;touch-action:none}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;color:var(--text)}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block;border-radius:14px;box-shadow:0 0 60px rgba(0,229,255,.12),0 0 60px rgba(255,46,136,.12)}
  .overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;background:rgba(6,9,18,.86);backdrop-filter:blur(6px);z-index:10;text-align:center;padding:20px}
  .hidden{display:none!important}
  h1{font-size:clamp(34px,7vw,64px);letter-spacing:.08em;font-weight:800;
     background:linear-gradient(90deg,var(--p1),var(--puck),var(--p2));
     -webkit-background-clip:text;background-clip:text;color:transparent;
     filter:drop-shadow(0 0 18px rgba(0,229,255,.35))}
  .sub{font-size:clamp(13px,2.4vw,17px);opacity:.85;line-height:1.9}
  .kbd{display:inline-block;border:1px solid #3a4a7a;border-radius:6px;padding:1px 8px;margin:0 2px;background:#141d38;font-weight:700;font-size:.9em}
  button{font-family:inherit;font-size:clamp(16px,3vw,20px);font-weight:800;letter-spacing:.12em;
    color:#0a0e1a;background:linear-gradient(90deg,var(--p1),#7df9ff);
    border:none;border-radius:999px;padding:14px 46px;cursor:pointer;
    box-shadow:0 0 24px rgba(0,229,255,.45);transition:transform .12s}
  button:active{transform:scale(.95)}
  button.pink{background:linear-gradient(90deg,var(--p2),#ff7ab5);box-shadow:0 0 24px rgba(255,46,136,.45)}
  .winner{font-size:clamp(28px,6vw,52px);font-weight:800}
  .winner.p1{color:var(--p1);text-shadow:0 0 22px rgba(0,229,255,.6)}
  .winner.p2{color:var(--p2);text-shadow:0 0 22px rgba(255,46,136,.6)}
  .pts{display:flex;gap:14px}
  .pts button{padding:10px 22px;font-size:15px;background:#182448;color:var(--text);box-shadow:none;border:1px solid #2c3d6e}
  .pts button.sel{background:linear-gradient(90deg,var(--p1),var(--p2));color:#0a0e1a;font-weight:800}
  @media (prefers-reduced-motion: reduce){ *{transition:none!important} }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>

<!-- タイトル画面 -->
<div id="title" class="overlay">
  <h1>NEON HOCKEY</h1>
  <div class="sub">
    <b>ローカル2人対戦エアホッケー</b><br><br>
    📱 タッチ:自分の陣地をドラッグしてパドル操作<br>
    ⌨️ P1(下): <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span>
    P2(上): <span class="kbd">↑</span><span class="kbd">←</span><span class="kbd">↓</span><span class="kbd">→</span>
  </div>
  <div class="sub" style="opacity:.7">先取ポイント</div>
  <div class="pts" id="ptsRow">
    <button data-p="3">3点</button>
    <button data-p="5" class="sel">5点</button>
    <button data-p="7">7点</button>
  </div>
  <button id="startBtn">対戦スタート</button>
</div>

<!-- 勝利画面 -->
<div id="winScreen" class="overlay hidden">
  <div class="winner" id="winText"></div>
  <div class="sub" id="finalScore"></div>
  <button id="rematchBtn">もう一戦</button>
  <button id="menuBtn" class="pink">タイトルへ</button>
</div>

<script>
(() => {
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// ===== 論理コート座標 (縦長固定) =====
const W = 600, H = 1000;
const GOAL_W = 220;          // ゴール幅
const PADDLE_R = 46;
const PUCK_R = 26;
const FRICTION = 0.995;      // パックの減速
const MAX_PUCK_SPD = 26;
const PADDLE_SPD = 11;       // キーボード操作速度

let scale = 1, offX = 0, offY = 0;
let winPoints = 5;
let state = 'title';         // title | countdown | play | goalpause | over
let countdownT = 0;
let goalFlash = 0, goalBy = 0;

const p1 = { x: W/2, y: H - 140, vx:0, vy:0, score:0, color:'#00e5ff' }; // 下
const p2 = { x: W/2, y: 140,     vx:0, vy:0, score:0, color:'#ff2e88' }; // 上
const puck = { x: W/2, y: H/2, vx:0, vy:0 };
let particles = [];

// ===== リサイズ =====
function resize(){
  const vw = window.innerWidth, vh = window.innerHeight;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const s = Math.min(vw / W, vh / H) * 0.97;
  cv.width  = W * s * dpr;
  cv.height = H * s * dpr;
  cv.style.width  = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
  scale = s;
  const rect = () => cv.getBoundingClientRect();
  cv._rect = rect;
}
window.addEventListener('resize', resize);
resize();

// ===== 入力: キーボード =====
const keys = {};
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

// ===== 入力: タッチ / マウス =====
// 画面の上半分をタッチ → P2、下半分 → P1
const touches = {}; // id -> {player, x, y}
function toCourt(clientX, clientY){
  const r = cv.getBoundingClientRect();
  return { x: (clientX - r.left) / scale, y: (clientY - r.top) / scale };
}
function assignTouch(id, cx, cy){
  const c = toCourt(cx, cy);
  const player = c.y < H/2 ? 2 : 1;
  touches[id] = { player, x: c.x, y: c.y };
}
cv.addEventListener('touchstart', e => {
  e.preventDefault();
  for(const t of e.changedTouches) assignTouch(t.identifier, t.clientX, t.clientY);
}, {passive:false});
cv.addEventListener('touchmove', e => {
  e.preventDefault();
  for(const t of e.changedTouches){
    if(touches[t.identifier]){
      const c = toCourt(t.clientX, t.clientY);
      touches[t.identifier].x = c.x;
      touches[t.identifier].y = c.y;
    }
  }
}, {passive:false});
const clearTouch = e => { for(const t of e.changedTouches) delete touches[t.identifier]; };
cv.addEventListener('touchend', clearTouch);
cv.addEventListener('touchcancel', clearTouch);

// マウス(PCで1人テスト用: 下半分クリックでP1操作)
let mouseDown = false;
cv.addEventListener('mousedown', e => { mouseDown = true; assignTouch('m', e.clientX, e.clientY); });
window.addEventListener('mousemove', e => {
  if(mouseDown && touches['m']){
    const c = toCourt(e.clientX, e.clientY);
    touches['m'].x = c.x; touches['m'].y = c.y;
  }
});
window.addEventListener('mouseup', () => { mouseDown = false; delete touches['m']; });

// ===== パドル移動 =====
function movePaddle(p, targetX, targetY, minY, maxY){
  const prevX = p.x, prevY = p.y;
  p.x = Math.max(PADDLE_R, Math.min(W - PADDLE_R, targetX));
  p.y = Math.max(minY + PADDLE_R, Math.min(maxY - PADDLE_R, targetY));
  p.vx = p.x - prevX;
  p.vy = p.y - prevY;
}

function updatePaddles(){
  // タッチ優先
  let t1 = null, t2 = null;
  for(const id in touches){
    if(touches[id].player === 1) t1 = touches[id];
    else t2 = touches[id];
  }
  // P1 (下半分)
  if(t1){
    movePaddle(p1, t1.x, t1.y, H/2, H);
  } else {
    let dx = 0, dy = 0;
    if(keys['a']) dx -= 1; if(keys['d']) dx += 1;
    if(keys['w']) dy -= 1; if(keys['s']) dy += 1;
    if(dx||dy){ const m = Math.hypot(dx,dy); movePaddle(p1, p1.x + dx/m*PADDLE_SPD, p1.y + dy/m*PADDLE_SPD, H/2, H); }
    else { p1.vx = p1.vy = 0; }
  }
  // P2 (上半分)
  if(t2){
    movePaddle(p2, t2.x, t2.y, 0, H/2);
  } else {
    let dx = 0, dy = 0;
    if(keys['arrowleft']) dx -= 1; if(keys['arrowright']) dx += 1;
    if(keys['arrowup']) dy -= 1; if(keys['arrowdown']) dy += 1;
    if(dx||dy){ const m = Math.hypot(dx,dy); movePaddle(p2, p2.x + dx/m*PADDLE_SPD, p2.y + dy/m*PADDLE_SPD, 0, H/2); }
    else { p2.vx = p2.vy = 0; }
  }
}

// ===== パック物理 =====
function updatePuck(){
  puck.x += puck.vx;
  puck.y += puck.vy;
  puck.vx *= FRICTION;
  puck.vy *= FRICTION;

  // 左右の壁
  if(puck.x < PUCK_R){ puck.x = PUCK_R; puck.vx = Math.abs(puck.vx) * 0.92; spark(puck.x, puck.y, '#8fa3ff'); }
  if(puck.x > W - PUCK_R){ puck.x = W - PUCK_R; puck.vx = -Math.abs(puck.vx) * 0.92; spark(puck.x, puck.y, '#8fa3ff'); }

  // 上下の壁 (ゴール外のみ跳ね返す)
  const inGoalX = puck.x > (W - GOAL_W)/2 && puck.x < (W + GOAL_W)/2;
  if(puck.y < PUCK_R){
    if(inGoalX){ if(puck.y < -PUCK_R) goal(1); }
    else { puck.y = PUCK_R; puck.vy = Math.abs(puck.vy) * 0.92; spark(puck.x, puck.y, '#8fa3ff'); }
  }
  if(puck.y > H - PUCK_R){
    if(inGoalX){ if(puck.y > H + PUCK_R) goal(2); }
    else { puck.y = H - PUCK_R; puck.vy = -Math.abs(puck.vy) * 0.92; spark(puck.x, puck.y, '#8fa3ff'); }
  }

  // パドル衝突
  for(const p of [p1, p2]){
    const dx = puck.x - p.x, dy = puck.y - p.y;
    const dist = Math.hypot(dx, dy);
    const minD = PUCK_R + PADDLE_R;
    if(dist < minD && dist > 0){
      const nx = dx / dist, ny = dy / dist;
      // 位置補正
      puck.x = p.x + nx * minD;
      puck.y = p.y + ny * minD;
      // 反射 + パドル速度を加算
      const dot = puck.vx * nx + puck.vy * ny;
      puck.vx -= 2 * dot * nx;
      puck.vy -= 2 * dot * ny;
      puck.vx = puck.vx * 0.55 + p.vx * 1.35 + nx * 3;
      puck.vy = puck.vy * 0.55 + p.vy * 1.35 + ny * 3;
      spark(puck.x - nx*PUCK_R, puck.y - ny*PUCK_R, p.color);
    }
  }

  // 速度上限
  const spd = Math.hypot(puck.vx, puck.vy);
  if(spd > MAX_PUCK_SPD){
    puck.vx = puck.vx / spd * MAX_PUCK_SPD;
    puck.vy = puck.vy / spd * MAX_PUCK_SPD;
  }
}

// ===== ゴール処理 =====
function goal(scorer){
  if(state !== 'play') return;
  goalBy = scorer;
  const p = scorer === 1 ? p1 : p2;
  p.score++;
  goalFlash = 1;
  burst(puck.x, Math.max(PUCK_R, Math.min(H-PUCK_R, puck.y)), p.color);
  if(p.score >= winPoints){
    state = 'over';
    setTimeout(showWin, 900);
  } else {
    state = 'goalpause';
    setTimeout(() => resetPuck(scorer === 1 ? 2 : 1), 1200);
  }
}

function resetPuck(loserSide){
  puck.x = W/2;
  puck.y = loserSide === 1 ? H/2 + 120 : H/2 - 120;
  puck.vx = 0; puck.vy = 0;
  p1.x = W/2; p1.y = H - 140;
  p2.x = W/2; p2.y = 140;
  state = 'countdown';
  countdownT = 60; // 約1秒
}

// ===== パーティクル =====
function spark(x, y, color){
  for(let i = 0; i < 6; i++){
    particles.push({ x, y, vx:(Math.random()-.5)*8, vy:(Math.random()-.5)*8, life:20, color });
  }
}
function burst(x, y, color){
  for(let i = 0; i < 40; i++){
    const a = Math.random()*Math.PI*2, s = 2+Math.random()*10;
    particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:40+Math.random()*20, color });
  }
}

// ===== 描画 =====
function draw(){
  ctx.clearRect(0, 0, W, H);

  // コート背景
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#161028');
  g.addColorStop(.5, '#101830');
  g.addColorStop(1, '#0e1c30');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // ゴールフラッシュ
  if(goalFlash > 0){
    ctx.fillStyle = (goalBy === 1 ? 'rgba(0,229,255,' : 'rgba(255,46,136,') + goalFlash*0.25 + ')';
    ctx.fillRect(0, 0, W, H);
    goalFlash -= 0.02;
  }

  // センターライン & サークル
  ctx.strokeStyle = '#1d2b52';
  ctx.lineWidth = 4;
  ctx.setLineDash([18, 14]);
  ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(W/2, H/2, 110, 0, Math.PI*2); ctx.stroke();

  // ゴール
  for(const [y, color] of [[0, p2.color], [H, p1.color]]){
    ctx.strokeStyle = color;
    ctx.lineWidth = 8;
    ctx.shadowColor = color; ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.moveTo((W-GOAL_W)/2, y);
    ctx.lineTo((W+GOAL_W)/2, y);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // スコア
  ctx.font = '800 90px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,46,136,.28)';
  ctx.save(); ctx.translate(W/2, H/2 - 60); ctx.rotate(Math.PI); ctx.fillText(p2.score, 0, -0); ctx.restore();
  ctx.fillStyle = 'rgba(0,229,255,.28)';
  ctx.fillText(p1.score, W/2, H/2 + 130);

  // パーティクル
  for(let i = particles.length - 1; i >= 0; i--){
    const pt = particles[i];
    pt.x += pt.vx; pt.y += pt.vy; pt.vx *= .94; pt.vy *= .94; pt.life--;
    if(pt.life <= 0){ particles.splice(i, 1); continue; }
    ctx.globalAlpha = Math.min(1, pt.life / 20);
    ctx.fillStyle = pt.color;
    ctx.beginPath(); ctx.arc(pt.x, pt.y, 4, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // パック
  ctx.shadowColor = '#f8f32b'; ctx.shadowBlur = 24;
  ctx.fillStyle = '#f8f32b';
  ctx.beginPath(); ctx.arc(puck.x, puck.y, PUCK_R, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(10,14,26,.35)';
  ctx.beginPath(); ctx.arc(puck.x, puck.y, PUCK_R*0.55, 0, Math.PI*2); ctx.fill();

  // パドル
  for(const p of [p1, p2]){
    ctx.shadowColor = p.color; ctx.shadowBlur = 26;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, PADDLE_R, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(10,14,26,.4)';
    ctx.beginPath(); ctx.arc(p.x, p.y, PADDLE_R*0.6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, PADDLE_R*0.22, 0, Math.PI*2); ctx.fill();
  }

  // カウントダウン
  if(state === 'countdown'){
    const n = Math.ceil(countdownT / 60 * 3);
    ctx.font = '800 120px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(232,236,255,.9)';
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 30;
    ctx.fillText(n, W/2, H/2 + 42);
    ctx.shadowBlur = 0;
  }
}

// ===== メインループ =====
function loop(){
  if(state === 'play' || state === 'countdown' || state === 'goalpause'){
    updatePaddles();
    if(state === 'play') updatePuck();
    if(state === 'countdown'){
      countdownT--;
      if(countdownT <= 0) state = 'play';
    }
    draw();
  }
  requestAnimationFrame(loop);
}
loop();

// ===== UI =====
const titleEl = document.getElementById('title');
const winEl = document.getElementById('winScreen');
const winText = document.getElementById('winText');
const finalScore = document.getElementById('finalScore');

document.querySelectorAll('#ptsRow button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#ptsRow button').forEach(x => x.classList.remove('sel'));
    b.classList.add('sel');
    winPoints = parseInt(b.dataset.p);
  });
});

function startGame(){
  p1.score = 0; p2.score = 0;
  particles = [];
  titleEl.classList.add('hidden');
  winEl.classList.add('hidden');
  resetPuck(Math.random() < .5 ? 1 : 2);
}
function showWin(){
  const w = p1.score >= winPoints ? 1 : 2;
  winText.textContent = `PLAYER ${w} の勝ち!`;
  winText.className = 'winner ' + (w === 1 ? 'p1' : 'p2');
  finalScore.textContent = `${p1.score} - ${p2.score}`;
  winEl.classList.remove('hidden');
}
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('rematchBtn').addEventListener('click', startGame);
document.getElementById('menuBtn').addEventListener('click', () => {
  winEl.classList.add('hidden');
  titleEl.classList.remove('hidden');
  state = 'title';
});
})();
</script>
</body>
</html>
